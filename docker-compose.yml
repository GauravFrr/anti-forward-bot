version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forward_bot_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fwbot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-forward_bot_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: forward_bot_redis
    restart: always
    command: redis-server --requirepass changeme_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  bot:
    build: .
    container_name: forward_bot_app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    command: sh -c "alembic upgrade head && python -m app.main"

volumes:
  pgdata:
  redisdata:
